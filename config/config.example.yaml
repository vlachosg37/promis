# User-facing PROMIS configuration template.

# Input alignments. Provide either:
# - alignment_files: comma-separated BAM/CRAM paths
# - input_dir: directory scanned recursively for BAM/CRAM files
# BAM works without a reference genome; CRAM requires reference_genome to point
# to the matching FASTA.
alignment_files: ""
input_dir: ""
reference_genome: ""
container_image: "docker://ghcr.io/vlachosg37/promis:latest"  # Used only with Snakemake Apptainer/Singularity deployment

# Output directory for PROMIS tables and plots.
output_dir: output/promis

# Bundled resources. Override only when using custom loci or annotations.
repeats: promis/workflow/database/MSI_loci_hg38_coordinates_metadata_exonic_chr_rem_artefacts.csv
cytoband: promis/workflow/database/cytoBand_hg38.txt
scripts_dir: promis/workflow/scripts

# Read extraction and quality thresholds.
min_reads: 5  # Minimum deduplicated reads per locus during extraction
min_dev_reads: 5  # Minimum deviating reads to call instability at a locus
msi_deviation: 0.1  # Minimum fraction of repeat-length shift to consider deviating
bq_threshold: 20  # Minimum base quality for included reads
mq_threshold: 40  # Minimum mapping quality for included reads

# Instability calling logic.
call_by: both  # Use "count", "percent", or "both" to flag unstable loci
min_dev_percent: 10.0  # Minimum percentage of deviating reads for instability
min_length_percent: 20.0  # Minimum percent difference from reference length
use_GMM: true  # Fit a Gaussian Mixture Model to refine stable repeat length
balance_tolerance: 0.05  # Allowed imbalance between GMM components
min_total_reads: 50  # Minimum total reads per locus required for scoring
